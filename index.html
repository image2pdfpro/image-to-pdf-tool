<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image2PDF Pro Ultra</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* 🌈 BACKGROUND ANIMATION */
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  overflow-x:hidden;
  background:linear-gradient(-45deg,#ff00cc,#3333ff,#00ffcc,#ffcc00);
  background-size:400% 400%;
  animation:gradient 10s ease infinite;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* HEADER */
header{
  padding:25px;
  font-size:26px;
  font-weight:bold;
  text-shadow:0 0 10px black;
}

/* GLASS BOX */
.container{
  width:90%;
  max-width:650px;
  margin:40px auto;
  padding:30px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 0 30px rgba(0,0,0,0.3);
}

/* INPUT */
input{
  margin:15px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  padding:14px 25px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  color:black;
  background:linear-gradient(90deg,#00ffcc,#ffcc00,#ff00cc);
  background-size:200% 200%;
  transition:0.4s;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

button:hover{
  transform:scale(1.05);
  animation:btn 2s infinite;
}

@keyframes btn{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

/* PREVIEW */
#preview{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

#preview img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
  border:2px solid white;
  box-shadow:0 0 10px black;
}

/* PROGRESS BAR */
#progressBox{
  width:100%;
  background:rgba(0,0,0,0.3);
  border-radius:10px;
  margin-top:15px;
  height:12px;
  overflow:hidden;
}

#progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#00ffcc,#ffcc00,#ff00cc);
  transition:0.3s;
}

/* FOOTER */
footer{
  margin-top:40px;
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<header>🚀 Image2PDF PRO ULTRA</header>

<div class="container">

<h3>✨ Drag & Drop Images</h3>

<input type="file" id="files" multiple accept="image/*">

<br>

<button onclick="convertPDF()">🔥 Convert to PDF</button>

<div id="progressBox">
  <div id="progress"></div>
</div>

<div id="preview"></div>

</div>

<footer>⚡ Fast • Bright • Premium UI • No Backend Needed</footer>

<script>
const preview=document.getElementById("preview");
const progress=document.getElementById("progress");

/* PREVIEW */
document.getElementById("files").addEventListener("change",function(){
  preview.innerHTML="";
  Array.from(this.files).forEach(file=>{
    let r=new FileReader();
    r.onload=e=>{
      let img=document.createElement("img");
      img.src=e.target.result;
      preview.appendChild(img);
    }
    r.readAsDataURL(file);
  });
});

/* CONVERT */
async function convertPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let files=document.getElementById("files").files;

  if(!files.length){
    alert("Select images first!");
    return;
  }

  progress.style.width="10%";

  for(let i=0;i<files.length;i++){

    let img=await toBase64(files[i]);

    doc.addImage(img,"JPEG",10,10,180,160);

    if(i<files.length-1) doc.addPage();

    progress.style.width=((i+1)/files.length)*100+"%";
  }

  doc.save("Image2PDF-Ultra.pdf");

  setTimeout(()=>progress.style.width="0%",1000);
}

/* BASE64 */
function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}
</script>

</body>
</html>
