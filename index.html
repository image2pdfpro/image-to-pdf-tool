<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image2PDF Pro - Ultra SaaS Converter</title>

<meta name="description" content="Convert images to PDF instantly with Ultra SaaS tool. Fast, secure, drag & drop, premium UI.">
<meta name="keywords" content="image to pdf, jpg to pdf, pdf converter, online tool">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* 🌈 BACKGROUND */
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(-45deg,#0f172a,#1e3a8a,#9333ea,#06b6d4);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 8%;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

nav h1{
  color:#38bdf8;
}

/* BUTTONS */
.btn{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.btn-primary{
  background:#38bdf8;
  color:black;
}

.btn-primary:hover{
  transform:scale(1.05);
}

.btn-dark{
  background:black;
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px;
}

.hero h1{
  font-size:40px;
}

.hero p{
  opacity:0.8;
}

/* UPLOAD BOX */
.box{
  width:90%;
  max-width:650px;
  margin:20px auto;
  padding:30px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.3);
}

/* DROP */
.drop{
  border:2px dashed #38bdf8;
  padding:25px;
  border-radius:15px;
  margin-bottom:15px;
  transition:0.3s;
}

.drop:hover{
  background:rgba(56,189,248,0.2);
}

/* PREVIEW */
.preview{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.preview img{
  width:80px;
  height:80px;
  border-radius:10px;
  border:2px solid white;
}

/* PROGRESS */
.progress-bar{
  width:100%;
  height:10px;
  background:rgba(0,0,0,0.4);
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#38bdf8,#a855f7,#22c55e);
  transition:0.3s;
}

/* PRICING */
.pricing{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px 10%;
}

.card{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  text-align:center;
}

.card h2{
  color:#38bdf8;
}

/* ADS */
.ad{
  width:90%;
  margin:20px auto;
  padding:20px;
  text-align:center;
  border:1px dashed white;
  opacity:0.6;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h1>Image2PDF Pro Ultra</h1>
  <div>
    <button class="btn btn-dark">Login</button>
    <button class="btn btn-primary">Start Free</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>🚀 Convert Images to PDF Instantly</h1>
  <p>Ultra Fast • Secure • SaaS Level Tool</p>
</div>

<!-- ADS -->
<div class="ad">AdSense Banner Space</div>

<!-- TOOL -->
<div class="box">

<div class="drop">
  📁 Drag & Drop Images Here
</div>

<input type="file" id="files" multiple accept="image/*">

<br><br>

<button class="btn btn-primary" onclick="convert()">🔥 Convert Now</button>

<div class="progress-bar">
  <div class="progress" id="progress"></div>
</div>

<br>

<div class="preview" id="preview"></div>

</div>

<!-- PRICING -->
<div class="pricing">

<div class="card">
  <h2>Free</h2>
  <p>Basic conversion</p>
  <button class="btn btn-primary">Start</button>
</div>

<div class="card">
  <h2>Pro</h2>
  <p>No ads + faster</p>
  <button class="btn btn-primary">Upgrade</button>
</div>

<div class="card">
  <h2>Business</h2>
  <p>API access</p>
  <button class="btn btn-primary">Contact</button>
</div>

</div>

<!-- FOOTER -->
<footer>
© 2026 Image2PDF Pro Ultra | Built for SaaS Growth
</footer>

<script>

const filesInput = document.getElementById("files");
const preview = document.getElementById("preview");
const progress = document.getElementById("progress");

/* PREVIEW */
filesInput.addEventListener("change",()=>{
  preview.innerHTML="";
  Array.from(filesInput.files).forEach(f=>{
    let r=new FileReader();
    r.onload=e=>{
      let img=document.createElement("img");
      img.src=e.target.result;
      preview.appendChild(img);
    }
    r.readAsDataURL(f);
  });
});

/* CONVERT */
async function convert(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let files = filesInput.files;

  if(!files.length){
    alert("Select images first!");
    return;
  }

  progress.style.width="10%";

  for(let i=0;i<files.length;i++){

    let img = await toBase64(files[i]);

    doc.addImage(img,"JPEG",10,10,180,160);

    if(i < files.length - 1) doc.addPage();

    progress.style.width = ((i+1)/files.length)*100 + "%";
  }

  doc.save("Image2PDF-Ultra.pdf");

  setTimeout(()=>{
    progress.style.width="0%";
  },1000);

}

/* BASE64 */
function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

</script>

</body>
</html>
