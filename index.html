<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Image2PDFPro - Ultra Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

header{
  padding:15px;
  text-align:center;
  background:#111827;
  font-size:20px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.drop{
  border:2px dashed #3b82f6;
  padding:30px;
  text-align:center;
  border-radius:10px;
  background:#111827;
  cursor:pointer;
}

.drop:hover{
  background:#1f2937;
}

input{display:none;}

.controls{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

select,button{
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:20px;
}

.card{
  position:relative;
  border-radius:8px;
  overflow:hidden;
  cursor:grab;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card button{
  position:absolute;
  top:5px;
  right:5px;
  background:red;
  border:none;
  border-radius:50%;
  width:22px;
  height:22px;
  color:white;
}

.progress{
  margin-top:15px;
  height:6px;
  background:#1f2937;
  border-radius:5px;
  overflow:hidden;
  display:none;
}

.bar{
  height:100%;
  width:0%;
  background:#3b82f6;
}
</style>
</head>

<body>

<header>🚀 Image2PDFPro Ultra Pro</header>

<div class="container">

<div class="drop" id="drop">
  Click or Drop Images Here
  <input type="file" id="file" multiple accept="image/*">
</div>

<div class="controls">
  <select id="quality">
    <option value="1">HD Quality</option>
    <option value="0.7">Standard</option>
  </select>

  <select id="size">
    <option value="a4">A4</option>
    <option value="fit">Fit Image</option>
  </select>

  <button onclick="generatePDF()">Generate PDF</button>
</div>

<div class="progress" id="progress">
  <div class="bar" id="bar"></div>
</div>

<div class="grid" id="grid"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let files = [];

const fileInput = document.getElementById("file");
const drop = document.getElementById("drop");

drop.onclick = ()=> fileInput.click();

fileInput.onchange = e=>{
  files = Array.from(e.target.files);
  render();
};

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  files.forEach((file,i)=>{
    const reader = new FileReader();

    reader.onload = e=>{
      const div = document.createElement("div");
      div.className = "card";
      div.draggable = true;

      div.ondragstart = ev=>{
        ev.dataTransfer.setData("index", i);
      };

      div.ondrop = ev=>{
        let from = ev.dataTransfer.getData("index");
        let to = i;
        [files[from], files[to]] = [files[to], files[from]];
        render();
      };

      div.ondragover = e=>e.preventDefault();

      div.innerHTML = `
        <img src="${e.target.result}">
        <button onclick="remove(${i})">x</button>
      `;

      grid.appendChild(div);
    };

    reader.readAsDataURL(file);
  });
}

function remove(i){
  files.splice(i,1);
  render();
}

async function generatePDF(){
  if(files.length===0){
    alert("Upload images first");
    return;
  }

  const progress = document.getElementById("progress");
  const bar = document.getElementById("bar");

  progress.style.display="block";

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const quality = document.getElementById("quality").value;
  const size = document.getElementById("size").value;

  for(let i=0;i<files.length;i++){

    let img = await toBase64(files[i]);

    if(i!==0) pdf.addPage();

    let w = 180;
    let h = 160;

    if(size==="fit"){
      w = 190;
      h = 250;
    }

    pdf.addImage(img,"JPEG",10,10,w*quality,h*quality);

    bar.style.width = ((i+1)/files.length)*100 + "%";
  }

  pdf.save("Image2PDFPro.pdf");

  setTimeout(()=>{
    progress.style.display="none";
    bar.style.width="0%";
  },1000);
}

function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}
</script>

</body>
</html>
