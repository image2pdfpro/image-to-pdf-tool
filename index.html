<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Image to PDF Converter Online | Fast Secure Tool</title>

<meta name="description" content="Convert images to PDF online for free. Fast, secure, no signup required. Mobile friendly and high quality PDF generator tool.">
<meta name="keywords" content="image to pdf, jpg to pdf, pdf converter online, free pdf maker, image converter tool, online pdf tool, fast image to pdf">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* SIDE LIONS */
.side{
  position:fixed;
  top:0;
  width:140px;
  height:100vh;
  z-index:0;
}

.side img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.15;
}

.left{left:0;}
.right{right:0;}

/* MAIN */
main{
  margin:0 auto;
  max-width:800px;
  padding:20px;
  position:relative;
  z-index:1;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
  color:#2563eb;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px;
  background:linear-gradient(135deg,#2563eb,#1e40af);
  color:white;
  border-radius:12px;
}

/* TOOL BOX */
.box{
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  text-align:center;
}

input{display:none;}

.upload{
  border:2px dashed #2563eb;
  padding:30px;
  border-radius:10px;
  cursor:pointer;
}

button{
  margin-top:15px;
  background:#2563eb;
  color:white;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#1e40af;
}

/* FEATURES */
.features{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-top:30px;
}

.feature{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  margin-top:30px;
  background:#111827;
  color:white;
}

/* MOBILE */
@media(max-width:768px){
  .side{display:none;}
}
</style>
</head>

<body>

<!-- SIDE LIONS -->
<div class="side left">
  <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d" />
</div>

<div class="side right">
  <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d" />
</div>

<main>

<header>🖼️ Image2PDFPro</header>

<div class="hero">
  <h1>Convert Images to PDF Instantly</h1>
  <p>Free, Fast & Secure Online Tool</p>
</div>

<div class="box">

  <label class="upload">
    📁 Click or Drop Images Here
    <input type="file" id="file" multiple accept="image/*">
  </label>

  <button onclick="convert()">Convert to PDF</button>

  <div id="status"></div>

</div>

<div class="features">
  <div class="feature">⚡ Fast Processing</div>
  <div class="feature">🔒 Secure Browser Tool</div>
  <div class="feature">📱 Mobile Friendly</div>
  <div class="feature">💎 Free Forever</div>
</div>

</main>

<footer>
© 2026 Image2PDFPro | All Rights Reserved
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let files=[];

document.getElementById("file").addEventListener("change",e=>{
  files=Array.from(e.target.files);
  document.getElementById("status").innerHTML="📸 "+files.length+" images selected";
});

async function convert(){
  if(files.length===0){
    alert("Please upload images");
    return;
  }

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  for(let i=0;i<files.length;i++){
    const img=await toBase64(files[i]);
    if(i!==0) pdf.addPage();
    pdf.addImage(img,"JPEG",10,10,180,160);
  }

  pdf.save("Image2PDFPro.pdf");
}

function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}
</script>

</body>
</html>
